<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Login — Student Attendance System</title>
  <meta name="description" content="Sign in to your student account to view your attendance records." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🎓</div>
      <h1>Student Login</h1>
      <p>Welcome back! Sign in to your account</p>
    </div>

    <div id="alert-box" class="alert"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input
          id="email"
          type="email"
          class="form-input"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          id="password"
          type="password"
          class="form-input"
          autocomplete="current-password"
          required
        />
      </div>

      <button id="submit-btn" type="submit" class="btn btn-primary">
        Sign In
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account?
      <a href="student-signup.html">Sign up here</a>
    </p>
    <p class="auth-footer" style="margin-top: 0.5rem;">
      Are you a teacher?
      <a href="teacher-login.html">Teacher Login</a>
    </p>
  </div>

  <script type="module" src="js/student-login.js"></script>
</body>
</html>
