<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Dashboard — Student Attendance System</title>
  <meta name="description" content="Manage and mark student attendance for all subjects." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .mark-form-card {
      background: var(--gradient-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow-card);
    }
    .mark-form-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .mark-form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    @media (max-width: 640px) {
      .mark-form-row { grid-template-columns: 1fr; }
    }
    .student-row-name {
      font-weight: 600;
      color: var(--text-primary);
      font-size: 0.9rem;
    }
    .student-row-meta {
      font-size: 0.77rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .online-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }
    .online-dot.online { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
    .online-dot.offline { background: var(--text-muted); }
    .mark-result-box {
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 1rem;
      margin-top: 1rem;
      font-size: 0.88rem;
      display: none;
    }
    .mark-result-box.show { display: block; }
    .result-item { margin-bottom: 0.3rem; }
    .result-item.success { color: #6ee7b7; }
    .result-item.warn { color: #fcd34d; }
  </style>
</head>
<body class="dashboard-page">

  <!-- Page Loading -->
  <div class="page-loading" id="page-loading">
    <span class="spinner" style="width:40px;height:40px;border-width:3px;"></span>
  </div>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="#" class="navbar-brand">
      <div class="navbar-logo">👨‍🏫</div>
      <div>
        <div class="navbar-title">AttendanceHub</div>
        <div class="navbar-subtitle">Teacher Portal</div>
      </div>
    </a>
    <div class="navbar-right">
      <div class="user-badge">
        <div class="user-avatar" id="avatar-initials">--</div>
        <span class="user-name" id="user-display-name">Loading...</span>
      </div>
      <button class="btn-logout" id="logout-btn">Sign Out</button>
    </div>
  </nav>

  <!-- Dashboard Content -->
  <main class="dashboard-content">

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon stat-icon-blue">👥</div>
        <div>
          <div class="stat-value" id="stat-total">—</div>
          <div class="stat-label">Total Students</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon stat-icon-green">🟢</div>
        <div>
          <div class="stat-value" id="stat-online">—</div>
          <div class="stat-label">Currently Online</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon stat-icon-purple">📋</div>
        <div>
          <div class="stat-value" id="stat-records">—</div>
          <div class="stat-label">Total Records</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon stat-icon-amber">📅</div>
        <div>
          <div class="stat-value" id="stat-today">—</div>
          <div class="stat-label">Marked Today</div>
        </div>
      </div>
    </div>

    <!-- Mark Attendance Form -->
    <div class="mark-form-card">
      <div class="mark-form-title">✏️ Mark Attendance</div>

      <div class="mark-form-row">
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label" for="att-subject">Subject</label>
          <select id="att-subject" class="form-input">
            <option value="">Select a subject</option>
            <option value="Mathematics">Mathematics</option>
            <option value="Physics">Physics</option>
            <option value="Chemistry">Chemistry</option>
            <option value="Computer Science">Computer Science</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label" for="att-date">Date (Mon – Fri only)</label>
          <input type="date" id="att-date" class="form-input" />
        </div>
      </div>

      <div id="alert-mark" class="alert" style="margin-top:0.8rem;"></div>

      <div class="table-wrapper" id="mark-table-wrapper" style="display:none;">
        <table>
          <thead>
            <tr>
              <th>Roll No.</th>
              <th>Name</th>
              <th>Division</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="mark-tbody">
            <!-- Rows generated by JS -->
          </tbody>
        </table>
      </div>

      <div id="mark-empty" class="empty-state" style="display:none;">
        <div class="empty-state-icon">👤</div>
        <p>No students registered yet.</p>
      </div>

      <div style="margin-top:1.2rem;display:flex;gap:0.8rem;align-items:center;flex-wrap:wrap;" id="mark-actions" style="display:none;">
        <button id="btn-mark-all-present" class="btn btn-success btn-sm">✅ Mark All Present</button>
        <button id="btn-mark-all-absent" class="btn btn-sm" style="background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;">❌ Mark All Absent</button>
        <button id="btn-submit-attendance" class="btn btn-primary btn-sm" style="margin-left:auto;">Save Attendance</button>
      </div>

      <div class="mark-result-box" id="mark-result-box"></div>
    </div>

    <!-- Student List -->
    <div class="section-card">
      <div class="section-header">
        <span class="section-title">👥 Registered Students</span>
        <input
          type="text"
          id="student-search"
          class="form-input"
          style="width:220px;padding:0.4rem 0.8rem;font-size:0.85rem;"
          placeholder="Search by name or roll..."
        />
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Roll No.</th>
              <th>Name</th>
              <th>Division</th>
              <th>Email</th>
              <th>Status</th>
              <th>Attendance</th>
            </tr>
          </thead>
          <tbody id="student-tbody">
            <!-- Rows injected by JS -->
          </tbody>
        </table>
      </div>
      <div class="empty-state" id="student-empty" style="display:none;">
        <div class="empty-state-icon">👤</div>
        <p>No students found.</p>
      </div>
    </div>

  </main>

  <script type="module" src="js/teacher-dashboard.js"></script>
</body>
</html>
