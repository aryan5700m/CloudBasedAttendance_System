<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Attendance System</title>
  <meta name="description" content="A modern student attendance management system for teachers and students." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .landing-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: var(--bg-primary);
      position: relative;
      overflow: hidden;
      text-align: center;
    }
    .landing-page::before {
      content: '';
      position: fixed;
      top: -40%;
      left: -20%;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    .landing-page::after {
      content: '';
      position: fixed;
      bottom: -30%;
      right: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(139,92,246,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .landing-logo {
      width: 80px;
      height: 80px;
      background: var(--gradient-primary);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      margin: 0 auto 1.5rem;
      box-shadow: 0 12px 30px rgba(59,130,246,0.4);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 12px 30px rgba(59,130,246,0.4); }
      50%       { box-shadow: 0 12px 50px rgba(59,130,246,0.65); }
    }
    .landing-title {
      font-size: 2.4rem;
      font-weight: 800;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.6rem;
    }
    .landing-sub {
      color: var(--text-secondary);
      font-size: 1rem;
      max-width: 400px;
      margin: 0 auto 2.5rem;
    }
    .portal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
      max-width: 500px;
      width: 100%;
      position: relative;
      z-index: 1;
    }
    @media (max-width: 480px) {
      .portal-grid { grid-template-columns: 1fr; }
      .landing-title { font-size: 1.8rem; }
    }
    .portal-card {
      background: var(--gradient-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 1.8rem 1.5rem;
      text-decoration: none;
      transition: var(--transition);
      box-shadow: var(--shadow-card);
    }
    .portal-card:hover {
      transform: translateY(-5px);
      border-color: rgba(59,130,246,0.3);
      box-shadow: var(--shadow-card), var(--shadow-glow);
    }
    .portal-icon {
      font-size: 2rem;
      margin-bottom: 0.7rem;
    }
    .portal-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }
    .portal-desc {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .portal-links {
      margin-top: 0.8rem;
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }
    .portal-link {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent-blue-light);
      text-decoration: none;
      padding: 0.3rem 0.6rem;
      border-radius: 50px;
      border: 1px solid rgba(59,130,246,0.25);
      transition: var(--transition);
    }
    .portal-link:hover {
      background: rgba(59,130,246,0.1);
    }
  </style>
</head>
<body class="landing-page">
  <div class="landing-logo">🏫</div>
  <h1 class="landing-title">AttendanceHub</h1>
  <p class="landing-sub">A modern attendance management system for students and teachers.</p>

  <div class="portal-grid">
    <div class="portal-card">
      <div class="portal-icon">🎓</div>
      <div class="portal-name">Student Portal</div>
      <div class="portal-desc">View your attendance records</div>
      <div class="portal-links">
        <a href="student-login.html" class="portal-link">Login</a>
        <a href="student-signup.html" class="portal-link">Sign Up</a>
      </div>
    </div>
    <div class="portal-card">
      <div class="portal-icon">👨‍🏫</div>
      <div class="portal-name">Teacher Portal</div>
      <div class="portal-desc">Manage and mark attendance</div>
      <div class="portal-links">
        <a href="teacher-login.html" class="portal-link">Login</a>
        <a href="teacher-signup.html" class="portal-link">Sign Up</a>
      </div>
    </div>
  </div>
</body>
</html>
