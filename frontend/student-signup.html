<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Sign Up — Student Attendance System</title>
  <meta name="description" content="Create your student account to track your attendance across all subjects." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🎓</div>
      <h1>Student Sign Up</h1>
      <p>Create your account to get started</p>
    </div>

    <div id="alert-box" class="alert"></div>

    <form id="signup-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="fullName">Full Name</label>
        <input
          id="fullName"
          type="text"
          class="form-input"
          autocomplete="name"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="division">Division</label>
        <input
          id="division"
          type="text"
          class="form-input"
          placeholder="e.g. A, B, C"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="rollNumber">Roll Number</label>
        <input
          id="rollNumber"
          type="text"
          class="form-input"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input
          id="email"
          type="email"
          class="form-input"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          id="password"
          type="password"
          class="form-input"
          autocomplete="new-password"
          required
        />
      </div>

      <button id="submit-btn" type="submit" class="btn btn-primary">
        Create Account
      </button>
    </form>

    <p class="auth-footer">
      Already have an account?
      <a href="student-login.html">Sign in here</a>
    </p>
    <p class="auth-footer" style="margin-top: 0.5rem;">
      Are you a teacher?
      <a href="teacher-signup.html">Teacher Sign Up</a>
    </p>
  </div>

  <script type="module" src="js/student-signup.js"></script>
</body>
</html>
