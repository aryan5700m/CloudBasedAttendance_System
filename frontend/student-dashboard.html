<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard — Student Attendance System</title>
  <meta name="description" content="View your attendance records across all subjects." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="dashboard-page">

  <!-- Page Loading Overlay -->
  <div class="page-loading" id="page-loading">
    <span class="spinner" style="width:40px;height:40px;border-width:3px;"></span>
  </div>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="#" class="navbar-brand">
      <div class="navbar-logo">🎓</div>
      <div>
        <div class="navbar-title">AttendanceHub</div>
        <div class="navbar-subtitle">Student Portal</div>
      </div>
    </a>
    <div class="navbar-right">
      <div class="user-badge">
        <div class="user-avatar" id="avatar-initials">--</div>
        <span class="user-name" id="user-display-name">Loading...</span>
      </div>
      <button class="btn-logout" id="logout-btn">Sign Out</button>
    </div>
  </nav>

  <!-- Dashboard Content -->
  <main class="dashboard-content">

    <!-- Stats Row -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card">
        <div class="stat-icon stat-icon-blue">📚</div>
        <div>
          <div class="stat-value" id="stat-total-classes">—</div>
          <div class="stat-label">Total Classes</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon stat-icon-green">✅</div>
        <div>
          <div class="stat-value" id="stat-present">—</div>
          <div class="stat-label">Days Present</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon stat-icon-red" style="background:rgba(239,68,68,0.15);">❌</div>
        <div>
          <div class="stat-value" id="stat-absent">—</div>
          <div class="stat-label">Days Absent</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon stat-icon-purple">📊</div>
        <div>
          <div class="stat-value" id="stat-percentage">—</div>
          <div class="stat-label">Attendance %</div>
        </div>
      </div>
    </div>

    <!-- Profile Card -->
    <div class="section-card">
      <div class="section-header">
        <span class="section-title">👤 Student Profile</span>
      </div>
      <div class="section-body">
        <div class="info-grid" id="profile-grid">
          <div class="info-item">
            <div class="info-item-label">Full Name</div>
            <div class="info-item-value" id="profile-name">—</div>
          </div>
          <div class="info-item">
            <div class="info-item-label">Division</div>
            <div class="info-item-value" id="profile-division">—</div>
          </div>
          <div class="info-item">
            <div class="info-item-label">Roll Number</div>
            <div class="info-item-value" id="profile-roll">—</div>
          </div>
          <div class="info-item">
            <div class="info-item-label">Email</div>
            <div class="info-item-value" id="profile-email">—</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Enrolled Subjects -->
    <div class="section-card">
      <div class="section-header">
        <span class="section-title">📖 Enrolled Subjects</span>
      </div>
      <div class="subjects-list" id="subjects-list">
        <!-- Pills injected by JS -->
      </div>
    </div>

    <!-- Attendance Table -->
    <div class="section-card">
      <div class="section-header">
        <span class="section-title">📋 Attendance Records</span>
        <div style="display:flex;gap:0.6rem;align-items:center;">
          <label for="filter-subject" style="font-size:0.82rem;color:var(--text-secondary);">Filter:</label>
          <select id="filter-subject" class="form-input" style="width:auto;padding:0.4rem 2rem 0.4rem 0.7rem;font-size:0.85rem;">
            <option value="">All Subjects</option>
          </select>
        </div>
      </div>
      <div class="table-wrapper">
        <table id="attendance-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Subject</th>
              <th>Date</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="attendance-tbody">
            <!-- Rows injected by JS -->
          </tbody>
        </table>
      </div>
      <div class="empty-state" id="attendance-empty" style="display:none;">
        <div class="empty-state-icon">📭</div>
        <p>No attendance records found for the selected filter.</p>
      </div>
    </div>

  </main>

  <script type="module" src="js/student-dashboard.js"></script>
</body>
</html>
